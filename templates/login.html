<!DOCTYPE html>
<html>
<head>
    <title>IntelX Login</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #0d1117, #020409);
            font-family: 'Courier New', monospace;
            color: #00ffcc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: #161b22;
            padding: 40px;
            border-radius: 10px;
            width: 320px;
            text-align: center;
            border: 1px solid #00ffcc;
            box-shadow: 0 0 20px rgba(0,255,204,0.2);
        }

        h2 {
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ffcc;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: black;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            outline: none;
        }

        input:focus {
            box-shadow: 0 0 10px #00ffcc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #00ffcc;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #00ccaa;
            box-shadow: 0 0 10px #00ffcc;
        }

        a {
            color: #00ffcc;
            text-decoration: none;
            display: block;
            margin-top: 15px;
        }

        a:hover {
            text-decoration: underline;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>🔐 IntelX Access</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <a href="/register">Create Account</a>

    <div class="footer">
        Secure OSINT Intelligence System
    </div>

</div>

</body>
</html>
